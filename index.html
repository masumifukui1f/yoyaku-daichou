<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約台帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}body{margin:0;font-size:16px;}
    #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;
      background:#f4f1ec;font-family:"Noto Serif JP",serif;font-size:16px;color:#8b5e2a;
      flex-direction:column;gap:16px;}
    .spinner{width:40px;height:40px;border:4px solid #f2e8db;border-top-color:#8b5e2a;
      border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @media(max-width:600px){
      .desktopOnly{display:none!important;}
      header{padding:6px 8px!important;}
      .fGrid{grid-template-columns:1fr!important;}
      body,input,button,select,textarea{font-size:16px!important;}
      /* カレンダー横スクロール禁止 */
      .calWrapper{width:100%!important;overflow-x:hidden!important;box-sizing:border-box!important;}
      .calGrid{grid-template-columns:repeat(7,minmax(0,1fr))!important;width:100%!important;}
      .calCell{min-height:80px!important;padding:2px 2px!important;overflow:hidden!important;}
      /* スマホ：縦並び（上：日付+予定 / 下：予約バッジ全幅） */
      .calCellInner{display:flex!important;flex-direction:column!important;gap:1px!important;min-height:100%;}
      .calTopRow{display:flex!important;flex-direction:row!important;align-items:center!important;gap:2px!important;flex-shrink:0;}
      .calDayNum{font-size:11px!important;flex-shrink:0!important;min-width:13px!important;text-align:center!important;}
      .calSchArea{display:flex!important;flex-direction:row!important;flex-wrap:wrap!important;gap:1px!important;flex:1;}
      .calSchBadge{font-size:6px!important;padding:0 1px!important;}
      .calResArea{display:flex!important;flex-direction:column!important;gap:1px!important;overflow:hidden;}
      .calResText{font-size:7px!important;padding:1px 2px!important;}
    }
    @media(min-width:601px){
      .desktopOnly{display:flex!important;}
      /* PC：横並び（左：日付+予定34px / 右：予約バッジ） */
      .calCellInner{display:flex!important;flex-direction:row!important;gap:3px!important;min-height:100%;}
      .calTopRow{display:flex!important;flex-direction:column!important;align-items:center!important;width:34px!important;flex-shrink:0!important;}
      .calDayNum{font-size:14px!important;text-align:center!important;width:100%!important;}
      .calSchArea{display:flex!important;flex-direction:column!important;align-items:flex-start!important;gap:1px!important;width:100%!important;}
      .calSchBadge{font-size:8px!important;padding:1px 2px!important;max-width:34px!important;display:block!important;}
      .calResArea{display:flex!important;flex-direction:column!important;flex:1!important;overflow:hidden!important;gap:1px!important;}
      .calResText{font-size:10px!important;padding:1px 3px!important;}
    }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><div>予約台帳を読み込み中…</div></div>

const NEUTRAL_VC = { color: "#1a1a1a", border: "#666", bg: "#f5f5f5" };
const COLORED_COMMANDS = ["新婦"];
const getVCWithCmd = (visitContent, command) => {
  const vc = getVC(visitContent);
  // 「打合せ」「その他」は常に色あり
  if (visitContent === "打合せ" || visitContent === "その他") return vc;
  // 「新規」「再来」「見直」「小物合わせ」「LF」はご用命が新婦のときだけ色あり
  const coloredVC = ["新規","再来","見直","小物合わせ","LF"];
  if (coloredVC.includes(visitContent)) {
    return COLORED_COMMANDS.includes(command) ? vc : NEUTRAL_VC;
  }
  return vc;
};
const SCHEDULE_TYPES = ["休暇", "キロクルStudio", "出張", "会議"];
const SCH_COLORS = {
  休暇: "#6b7280",

};
const SCH_PALETTE = ["#7c3aed","#0369a1","#065f46","#6b7280","#b45309","#9b2335","#1e6641","#5b2c8e","#8b5e2a","#374151"];
const getSchColor = (type, masters) => {
  if (SCH_COLORS[type]) return SCH_COLORS[type];
  const types = (masters && masters.scheduleTypes) || SCHEDULE_TYPES;

const TIME_OPTIONS = [];

  const hm = d.match(/(\d+)時間/),

  if (hm) t += parseInt(hm[1]) * 60;
  if (mm) t += parseInt(mm[1]);
  return t || 60;
};

  if (!t) return 0;

const dlText = (content, filename, mime = "text/plain") => {
  try {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { try{document.body.removeChild(a);}catch(e){} URL.revokeObjectURL(url); }, 1500);
  } catch(e1) {
    try {
      const a = document.createElement("a");
      a.href = "data:" + mime + ";charset=utf-8," + encodeURIComponent(content);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { try{document.body.removeChild(a);}catch(e){} }, 1500);
    } catch(e2) {
      const w = window.open("", "_blank");
      if (w) {
        if (mime.includes("json") || mime.includes("csv") || mime.includes("text")) {
          w.document.write("<pre style='font-family:monospace;font-size:12px;padding:16px;white-space:pre-wrap'>" +
            String(content).replace(/&/g,"&amp;").replace(/</g,"&lt;") + "</pre>");

const DPI = 2;
const clrText = (gctx, text, maxW) => {
  if (!text) return "";
  const s = String(text);
  if (gctx.measureText(s).width <= maxW) return s;
  let t = s;
  while (t.length > 0 && gctx.measureText(t + "…").width > maxW) t = t.slice(0, -1);
  return t + "…";
};
const rr = (gctx, x, y, w, h, rad) => {
  gctx.beginPath();
  gctx.moveTo(x + rad, y);
  gctx.lineTo(x + w - rad, y);
  gctx.quadraticCurveTo(x + w, y, x + w, y + rad);
  gctx.lineTo(x + w, y + h - rad);
  gctx.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
  gctx.lineTo(x + rad, y + h);
  gctx.quadraticCurveTo(x, y + h, x, y + h - rad);
  gctx.lineTo(x, y + rad);
  gctx.quadraticCurveTo(x, y, x + rad, y);
  gctx.closePath();
};
const captureToPNG = (selDate, reservations, daySchedules, masters) => {
  const sorted = [...reservations].sort((a, b) => a.visitTime.localeCompare(b.visitTime));
  const dt = new Date(selDate + "T00:00:00");
  const dateLabel = `${dt.getFullYear()}年${dt.getMonth() + 1}月${dt.getDate()}日（${WEEKDAYS[dt.getDay()]}）`;
  const G_START = 9 * 60,
    G_END = 19 * 60,
    G_TOTAL = G_END - G_START;
  const LW = 155,
    BAW = 850,
    GW = LW + BAW;
  const ROW_H = 60,
    TICK_H = 26,
    HDR_H = 56,
    PAD = 20,
    SEC_GAP = 28;

  // 担当者行
  const staffRows = [...(masters.salesStaff || []).map(name => ({
    name,
    role: "営業担当",
    rvs: sorted.filter(r => r.salesStaff === name),

  })), ...(masters.salesAssistants || []).map(name => ({
    name,
    role: "販売担当",
    rvs: sorted.filter(r => [r.salesAssistant1, r.salesAssistant2, r.salesAssistant].includes(name)),
    schs: daySchedules.filter(s => s.staffNames.includes(name))
  }))];

  // 部屋行
  const roomList = masters.rooms || [];
  const usedRooms = [...new Set(sorted.flatMap(r => [r.room1 || r.room, r.room2].filter(Boolean)))];
  const allRooms = [...new Set([...roomList, ...usedRooms])];
  const roomRows = allRooms.map(name => ({
    name,
    role: "部屋",
    rvs: sorted.filter(r => [r.room1 || r.room, r.room2].includes(name)),
    schs: daySchedules.filter(s => s.room === name)
  }));
  const staffGanttH = TICK_H + staffRows.length * ROW_H;
  const roomGanttH = roomRows.length > 0 ? TICK_H + roomRows.length * ROW_H : 30;
  const TOTAL_W = PAD + GW + PAD;
  const TOTAL_H = HDR_H + SEC_GAP + 18 + staffGanttH + SEC_GAP + 18 + roomGanttH + PAD * 2;
  const canvas = document.createElement("canvas");
  canvas.width = TOTAL_W * DPI;
  canvas.height = TOTAL_H * DPI;
  const g = canvas.getContext("2d");
  g.scale(DPI, DPI);

  // 背景
  g.fillStyle = "#f4f1ec";
  g.fillRect(0, 0, TOTAL_W, TOTAL_H);

  // ヘッダー
  g.fillStyle = "#1e1208";
  g.fillRect(0, 0, TOTAL_W, HDR_H);
  g.fillStyle = "#f2e8db";
  g.font = "bold 17px sans-serif";
  g.fillText("予　約　台　帳", PAD, 26);
  g.font = "12px sans-serif";
  g.fillText(`${dateLabel}　全 ${sorted.length} 件`, PAD, 46);
  // 凡例
  let legX = TOTAL_W - 310;
  VISIT_CONTENTS.forEach(vc => {
    g.fillStyle = vc.border;
    rr(g, legX, 20, 10, 10, 2);
    g.fill();
    g.fillStyle = "#f2e8db";
    g.font = "9px sans-serif";
    g.fillText(vc.value, legX + 13, 30);
    legX += g.measureText(vc.value).width + 22;
  });

  // ticks配列
  const ticks = [];
  for (let m = G_START; m <= G_END; m += 60) ticks.push(m);

  // ガントチャート描画関数（純粋関数、外部yを受け取りreturnする）
  const drawGantt = (rows, startY, title) => {
    let curY = startY;
    // セクション見出し
    g.fillStyle = "#8b5e2a";
    g.font = "bold 12px sans-serif";
    g.fillText(`▼ ${title}`, PAD, curY + 13);
    curY += 20;
    const GL = PAD; // gantt left
    const totalH = TICK_H + rows.length * ROW_H;

    g.fill();
    g.strokeStyle = "#ddd5c8";
    g.lineWidth = 1;
    g.stroke();

    // 時刻ヘッダー
    g.fillStyle = "#1e1208";
    g.fillRect(GL, curY, GW, TICK_H);
    g.fillStyle = "#f2e8db";
    g.font = "10px sans-serif";
    ticks.forEach(t => {
      const tx = GL + LW + (t - G_START) / G_TOTAL * BAW;
      g.fillText(fmtTime(Math.floor(t / 60), 0), tx - 12, curY + 17);
    });
    curY += TICK_H;
    rows.forEach((row, ri) => {
      const rowY = curY + ri * ROW_H;

      // 行背景
      g.fillStyle = ri % 2 === 0 ? "#fff" : "#faf8f5";
      g.fillRect(GL, rowY, GW, ROW_H);

      // ラベル

      g.fillRect(GL, rowY, LW, ROW_H);
      g.strokeStyle = "#ddd5c8";
      g.lineWidth = 0.5;
      g.strokeRect(GL, rowY, LW, ROW_H);
      g.fillStyle = "#8b5e2a";

      g.fillStyle = "#7a7060";
      g.font = "9px sans-serif";
      g.fillText(row.role, GL + 7, rowY + 34);
      if (row.rvs.length === 0) {
        g.fillStyle = "#ccc";
        g.font = "9px sans-serif";
        g.fillText("予約なし", GL + 7, rowY + 48);
      }

      // グリッド線
      g.strokeStyle = "#ede8e0";
      g.lineWidth = 0.5;
      ticks.forEach(t => {
        const tx = GL + LW + (t - G_START) / G_TOTAL * BAW;

      row.schs.forEach(s => {

        if (ce <= cs) return;
        const bx = GL + LW + (cs - G_START) / G_TOTAL * BAW;
        const bw = Math.max((ce - cs) / G_TOTAL * BAW, 4);

        g.globalAlpha = 0.18;
        g.fillStyle = col;

        g.fillText(clrText(g, `${s.scheduleType} ${s.timeFrom}〜${s.timeTo}`, bw - 4), bx + 3, rowY + 13);

      // 予約バー

        g.stroke();

        // 注意事項縦ライン
        if (hasNotes) {

        }

        // 1段目：時刻 + 名前
        g.fillStyle = vc.color;

          g.font = "bold 10px sans-serif";
          g.fillText("📌", bx + bw - 14, barY + 36);
        }
      });

    curY += 20;

        }
      }

  } catch(e) {

    navStack.current.push({
      page: newPage,
      navCtx: newNavCtx

    setPage(newPage);
    setNavCtx(newNavCtx);

    if (navPos.current <= 0) return;
    navPos.current -= 1;
    const entry = navStack.current[navPos.current];
    setPage(entry.page);
    setNavCtx(entry.navCtx);
  }, []);
  const goFwd = useCallback(() => {
    if (navPos.current >= navStack.current.length - 1) return;
    navPos.current += 1;
    const entry = navStack.current[navPos.current];
    setPage(entry.page);
    setNavCtx(entry.navCtx);
  }, []);

  // 戻る・進む可否（再レンダリングのためにdummy stateで管理）

  }, [navigate, triggerNavUpdate]);
  const goBackWithUpdate = useCallback(() => {
    goBack();
    triggerNavUpdate();
  }, [goBack, triggerNavUpdate]);
  const goFwdWithUpdate = useCallback(() => {
